<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TV Player">
  <title>TV Player</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="icon" href="assets/icon.png">
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <div id="stage">
    <video id="player" playsinline preload="auto"></video>
    <div id="backdrop"></div>
    <main id="app"></main>
    <div id="toast" aria-live="polite"></div>
    <div id="splash">
      <div class="brand-mark"><span>TV</span><b>▶</b></div>
      <div class="splash-subtitle">Телевидение и медиатека</div>
    </div>
  </div>
  <script src="config.js?v=7"></script>
  <script src="data.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
