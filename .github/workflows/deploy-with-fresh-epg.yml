name: Deploy TV Player with fresh EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build fresh EPG
        env:
          TV_PLAYER_PLAYLIST_URL: ${{ secrets.TV_PLAYER_PLAYLIST_URL }}
        run: node --max-old-space-size=2048 tools/build-epg.mjs
      - name: Prepare static site
        run: |
          mkdir _site
          cp index.html styles.css config.js data.js sports.js app.js sw.js manifest.json .nojekyll _site/
          cp -R assets epg _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
